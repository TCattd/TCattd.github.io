---
layout: default
---
<!-- Page Header -->
{% if page.background %}
<header class="masthead" style="background-image: url('{{ page.background | prepend: site.baseurl | replace: '//', '/' }}')">
{% else %}
<header class="masthead" style="background-image: url('{{ site.background_default | prepend: site.baseurl | replace: '//', '/' }}')">
{% endif %}
  <div class="overlay"></div>
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-md-10 mx-auto">
        <div class="post-heading">
          <h1>Posts in "{{ page.title | capitalize }}"</h1>
          {% if page.subtitle %}
          <h2 class="subheading">{{ page.subtitle }}</h2>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</header>

<div class="container content-post">
  <div class="row">
    <div class="col-lg-8 col-md-10 mx-auto">

    <hr/>

    <article class="post-content">
      <ul class="posts-list">
        {% for post in page.posts %}
        <li><strong><a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></strong><span class="post-date"> - {{ post.date | date: "%B %-d, %Y" }}</span></li>
        {% endfor %}
      </ul>
    </article>

    <hr/>

    </div>
  </div>
</div>
